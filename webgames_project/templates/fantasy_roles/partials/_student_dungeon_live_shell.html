<section
  id="dungeon-live-panel"
  class="fr-dungeon-live {% if run and run.dungeon %}fr-dungeon-theme-{{ run.dungeon.name|slugify }}{% endif %}"
  {% if not run or run.status != "FAILED" %}
    hx-get="{% url 'fantasy_roles:student_dungeon_live_panel' session.join_code %}"
    hx-trigger="every 6s [!document.body.classList.contains('fr-dungeon-input-active')]"
    hx-swap="outerHTML"
  {% endif %}
>
  {% include "fantasy_roles/partials/student_dungeon_live_panel.html" %}
</section>
